# Coerentis (coerentis.co) — static site at repo root.
# Netlify Forms: contact + whitepaper use data-netlify="true".
# Transactional email (Resend): RESEND_API_KEY, RESEND_FROM_EMAIL (verified domain in production);
# optional NOTIFY_ADMIN_EMAIL for form copies.
# Stripe env: STRIPE_SECRET_KEY; STRIPE_PRICE_AUDIT_MONTHLY, STRIPE_PRICE_AUDIT_ANNUAL;
# STRIPE_PRICE_SIMULATION_MONTHLY, STRIPE_PRICE_SIMULATION_ONETIME, STRIPE_PRICE_ENTERPRISE_DEPOSIT;
# optional STRIPE_WEBHOOK_SECRET, STRIPE_ENABLE_AUTOMATIC_TAX=true
# Neon: DATABASE_URL + sql/neon-form-submissions.sql (+ sql/neon-email-confirmation.sql for double opt-in on contact/whitepaper)
#
[build]
  command = "true"
  publish = "."

[functions]
  directory = "netlify/functions"

