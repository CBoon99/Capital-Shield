# Capital Shield — static site (root publish).
# Before go-live: Netlify → Site configuration → General → set site visibility
# to public (disable password protection). Then submit /sitemap.xml in
# Google Search Console and Bing Webmaster Tools.
#
# No bundler: index.html, assets, and Python package live in this repo.
# command = "true" avoids Netlify inferring a failing npm build.
[build]
  command = "true"
  publish = "."
