# Coerentis (coerentis.co) — static site at repo root.
# Netlify Forms: contact + whitepaper use data-netlify="true".
# Stripe: STRIPE_SECRET_KEY, STRIPE_PRICE_AUDIT_MONTHLY, STRIPE_PRICE_AUDIT_ANNUAL (Price IDs from Dashboard)
# Optional: STRIPE_WEBHOOK_SECRET for /.netlify/functions/stripe-webhook; STRIPE_ENABLE_AUTOMATIC_TAX=true if Stripe Tax is on
#
[build]
  command = "true"
  publish = "."

[functions]
  directory = "netlify/functions"

